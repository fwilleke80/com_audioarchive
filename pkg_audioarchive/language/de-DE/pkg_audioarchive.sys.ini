PKG_AUDIOARCHIVE_XML_DESCRIPTION="<h2>Joomla! Audio Archive</h2><p>Audio Archive ist ein Joomla!-6-Paket zum Verwalten und Veröffentlichen großer, durchsuchbarer Sammlungen von Audioclips.</p><h3>Enthaltene Erweiterungen und Funktionen</h3><ul><li><strong>Audio-Archive-Komponente</strong> — Clips, Metadaten, Kategorien und Schlagwörter verwalten; Massenuploads und Verzeichnisimporte durchführen; geschützte Wiedergabe, Archivfilter, Clip-Detailseiten und Downloads der Originaldateien bereitstellen.</li><li><strong>Audio-Archive-Modul</strong> — Neueste, zufällige, tägliche, beliebte oder gezielt ausgewählte Clips anzeigen.</li><li><strong>Audio-Archive-Schlagwortmodul</strong> — Archivschlagwörter für eine komfortable Navigation und Filterung anzeigen.</li><li><strong>Smart-Search-Plugin</strong> — Geeignete Clips im Joomla Finder indexieren.</li><li><strong>Inhaltsplugin</strong> — Zufällige oder ausgewählte Clips einbetten sowie öffentliche Clip-Anzahlen oder die Gesamtspielzeit in Beiträge und andere vorbereitete Inhalte einfügen.</li><li><strong>Quick-Icon-Plugin</strong> — Das Audio-Archive-Dashboard direkt vom Joomla-Administrator-Dashboard aus öffnen.</li></ul>"
