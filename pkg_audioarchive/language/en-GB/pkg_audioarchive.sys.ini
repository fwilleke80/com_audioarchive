; Joomla! Audio Archive package system language file
PKG_AUDIOARCHIVE_XML_DESCRIPTION="<h2>Joomla! Audio Archive</h2><p>Audio Archive is a Joomla! 6 package for managing and publishing large, searchable collections of audio clips.</p><h3>Included extensions and features</h3><ul><li><strong>Audio Archive component</strong> — Manage clips, metadata, categories and tags; perform bulk uploads and directory imports; provide protected playback, archive filtering, clip detail pages and original-file downloads.</li><li><strong>Audio Archive module</strong> — Display latest, random, clip-of-the-day, popular or specifically selected clips.</li><li><strong>Audio Archive Tags module</strong> — Present archive tags for convenient discovery and filtering.</li><li><strong>Smart Search plugin</strong> — Index eligible clips in Joomla Finder.</li><li><strong>Content plugin</strong> — Embed random or selected clips and insert public clip counts or total playtime into articles and other prepared content.</li><li><strong>Quick Icon plugin</strong> — Open the Audio Archive dashboard directly from the Joomla administrator dashboard.</li></ul>"
